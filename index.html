<!DOCTYPE html>
<html lang="sk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Odpočet pre test</title>
<style>
  body {
    font-family: 'Helvetica', sans-serif;
    background: #fff0f5;
    color: #333;
    text-align: center;
    padding: 50px;
  }
  h1 {
    font-size: 2em;
    color: #d6336c;
  }
  #countdown {
    font-size: 3em;
    margin: 20px 0;
    color: #6f42c1;
  }
  .heart {
    color: #d6336c;
    font-size: 2em;
    animation: heartbeat 1s infinite;
  }
  @keyframes heartbeat {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.3); }
  }
  #message {
    font-size: 1.2em;
    margin-top: 30px;
    display: none;
  }
  .confetti {
    position: absolute;
    width: 10px;
    height: 10px;
    background: #ff69b4;
    top: 0;
    animation: fall 3s linear infinite;
  }
  @keyframes fall {
    0% { top: -10px; }
    100% { top: 100vh; }
  }
</style>
</head>
<body>

<h1>Test odpočtu! <span class="heart">❤️</span></h1>
<p>Odpočítavaš do testovacieho momentu 🎁</p>
<div id="countdown">00:00:00</div>

<div id="message">
  🎉 Odpočet skončil! Skontroluj, čo príde ďalej 🎁❤️
</div>

<script>
  // Nastavenie konca odpočtu - dnešný deň o 04:05
  const today = new Date();
  const countDownDate = new Date(
    today.getFullYear(),
    today.getMonth(),
    today.getDate(),
    4, 5, 0
  ).getTime();

  const countdownFunction = setInterval(function() {
    const now = new Date().getTime();
    const distance = countDownDate - now;

    const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
    const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
    const seconds = Math.floor((distance % (1000 * 60)) / 1000);

    document.getElementById("countdown").innerHTML = 
      ("0"+hours).slice(-2) + ":" + ("0"+minutes).slice(-2) + ":" + ("0"+seconds).slice(-2);

    if (distance < 0) {
      clearInterval(countdownFunction);
      document.getElementById("countdown").style.display = "none";
      document.getElementById("message").style.display = "block";

      // Vytvorenie konfiet
      for(let i=0;i<50;i++){
        let confetti = document.createElement("div");
        confetti.className = "confetti";
        confetti.style.left = Math.random()*100 + "vw";
        confetti.style.background = ["#ff69b4","#ff1493","#d6336c","#6f42c1"][Math.floor(Math.random()*4)];
        confetti.style.animationDuration = (Math.random()*3+2) + "s";
        document.body.appendChild(confetti);
      }
    }
  }, 1000);
</script>

</body>
</html>
